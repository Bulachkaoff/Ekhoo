<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDima61QgwywobN6QQwtFpfU7WOAGxyYKU",
    authDomain: "ekhoo-app.firebaseapp.com",
    projectId: "ekhoo-app",
    storageBucket: "ekhoo-app.firebasestorage.app",
    messagingSenderId: "34984268760",
    appId: "1:34984268760:web:5c1346c068a73fcec7d8ad",
    measurementId: "G-KXCYFLH8W6"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  const dbRef = ref(database, 'ekhoo_global_db');

  window.remoteDB = database; // Глобальный доступ к базе

  // СЛУШАТЕЛЬ: Получаем данные из облака
  onValue(dbRef, (snapshot) => {
    const cloudData = snapshot.val();
    if (cloudData) {
      localStorage.setItem('EKHOO_DB', JSON.stringify(cloudData));
      // Если чат открыт — перерисовываем
      if (typeof SESSION !== 'undefined' && SESSION.currentChat) {
        if (typeof renderChatMessages === 'function') renderChatMessages(SESSION.currentChat);
      }
      // Обновляем ленту волн, если она есть
      if (typeof renderWaves === 'function') renderWaves();
    }
  });
</script>

const DB_KEY='ekhoo_v900_db';
const SESSION={user:null,echoed:new Set(),draftWaveImg:null,draftChatImg:null,currentChat:null,device:'desktop'};

function getDB(){const raw=localStorage.getItem(DB_KEY);if(!raw)return freshDB();try{return JSON.parse(raw);}catch{return freshDB();}}
function saveDB(db) {
  // 1. Сохраняем локально в браузере
  localStorage.setItem('EKHOO_DB', JSON.stringify(db));

  // 2. Отправляем в Firebase (чтобы видели все)
  if (window.remoteDB) {
    import("https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js")
      .then(mod => {
        mod.set(mod.ref(window.remoteDB, 'ekhoo_global_db'), db);
      })
      .catch(e => console.error("Ошибка синхронизации с облаком:", e));
  }
}
  // 1. Сохраняем локально (для надежности)
  localStorage.setItem('EKHOO_DB', JSON.stringify(db));

  // 2. Отправляем в Firebase (чтобы видели все)
  if (window.remoteDB) {
    const { ref, set } = window['firebase-database'] || {}; 
    // Поскольку мы в обычном скрипте, используем глобальную ссылку
    import("https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js").then(mod => {
        mod.set(mod.ref(window.remoteDB, 'ekhoo_global_db'), db);
    });
  }
}function freshDB(){return{meta:{version:'9.0'},users:{},waves:[],chats:{},news:[T('news_default_1'),T('news_default_2'),T('news_default_3')]};}

function updateActivity(u){if(!u)return;const db=getDB();if(db.users[u]){db.users[u].last_seen=new Date().toISOString();saveDB(db);}}
function getUserStatus(username){
  const db=getDB();const u=db.users[username];
  if(!u||!u.last_seen)return{text:T('status_unknown'),color:'var(--text-gray)',online:false};
  const diff=(Date.now()-new Date(u.last_seen).getTime())/60000;
  if(diff<5)return{text:T('status_online'),color:'var(--accent)',online:true};
  const d=new Date(u.last_seen);
  const ts=`${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  return{text:`${T('status_offline')} (${ts})`,color:'var(--text-gray)',online:false};
}
function chatId(a,b){return[a,b].sort().join('_');}
function getAvatar(u){const db=getDB();return db.users[u]?.avatar||null;}

function miniAv(username,size=28){
  const av=getAvatar(username);const st=getUserStatus(username);
  const r=Math.max(3,Math.floor(size*.15));const clip=`polygon(${r}px 0%,100% 0%,calc(100% - ${r}px) 100%,0% 100%)`;
  const fs=Math.floor(size*.42);
  if(av)return`<img src="${av}" style="width:${size}px;height:${size}px;clip-path:${clip};object-fit:cover;flex-shrink:0;display:inline-block;vertical-align:middle;">`;
  const bg=st.online?'var(--accent)':'var(--border)';const fg=st.online?'var(--bg-dark)':'var(--text-white)';
  return`<span style="width:${size}px;height:${size}px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:${fs}px;background:${bg};color:${fg};clip-path:${clip};flex-shrink:0;vertical-align:middle;">${esc(username[0].toUpperCase())}</span>`;
}

function fmtTime(iso){
  if(!iso)return'';const d=new Date(iso);
  const now=new Date();const isToday=d.toDateString()===now.toDateString();
  const hm=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  if(isToday)return hm;
  return`${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')} ${hm}`;
}

function doLogin(){
  const u=document.getElementById('auth-user').value.trim();
  const p=document.getElementById('auth-pass').value.trim();
  const err=document.getElementById('auth-err');err.textContent='';
  if(!u||!p){err.textContent=T('auth_err_empty');return;}
  const db=getDB();
  if(!db.users[u]){
    db.users[u]={pwd:p,bio:'',displayName:'',avatar:null,birthday:'',joined:new Date().toISOString(),last_seen:new Date().toISOString(),show_news:true,device:'desktop',echoedWaves:[]};
    saveDB(db);
  }else if(db.users[u].pwd!==p){err.textContent=T('auth_err_pass');return;}
  SESSION.user=u;
  // restore echoed from db
  const dbU=getDB().users[u];
  SESSION.echoed=new Set(dbU.echoedWaves||[]);
  SESSION.device=dbU.device||'desktop';
  _pendingUser=u;
  updateActivity(u);
  // show device modal
  const dm=document.getElementById('device-modal');
  document.getElementById('dm-title').textContent=T('dm_title');
  document.getElementById('dm-body').textContent=T('dm_body');
  document.getElementById('dm-confirm').textContent=T('dm_confirm');
  document.getElementById('dev-lbl-desktop').textContent=T('dev_desktop');
  document.getElementById('dev-lbl-mobile').textContent=T('dev_mobile');
  document.getElementById('dev-lbl-tablet').textContent=T('dev_tablet');
  selectDevice(SESSION.device);
  dm.classList.add('show');
}
document.getElementById('auth-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function attachWavePhoto(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{SESSION.draftWaveImg=e.target.result;document.getElementById('attach-label').textContent='📎 '+f.name;};r.readAsDataURL(f);};
  inp.click();
}

function launchWave(){
  const text=document.getElementById('compose-text').value.trim();
  if(!text&&!SESSION.draftWaveImg&&!_waveDraftSticker)return;
  const db=getDB();const id='wv_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  db.waves.unshift({id,author:SESSION.user,text,media:SESSION.draftWaveImg||null,sticker:_waveDraftSticker||null,time:new Date().toISOString(),echoes:0,echoedBy:[],replies:[],gold:Math.random()<0.1});
  saveDB(db);
  document.getElementById('compose-text').value='';document.getElementById('attach-label').textContent='';SESSION.draftWaveImg=null;_waveDraftSticker=null;
  renderFeed();toast(T('toast_launched'));
}

function renderFeed(){
  const db=getDB();const c=document.getElementById('waves-feed');
  if(!db.waves.length){c.innerHTML=`<div class="empty-state">${T('no_waves_feed')}</div>`;return;}
  c.innerHTML=db.waves.map(w=>waveHTML(w)).join('');
}

function waveHTML(w){
  const st=getUserStatus(w.author);const isMe=w.author===SESSION.user;
  const echoed=SESSION.echoed.has(w.id);
  const bc=w.gold?'var(--gold)':'var(--border)';
  return`<div class="wave-card${w.gold?' gold-wave':''}" style="border-color:${bc}">
    <div class="wave-header">
      ${miniAv(w.author,26)}
      <span class="wave-author" onclick="showProfile('${esc(w.author)}')">${esc(w.author)}</span>
      <span class="wave-status" style="color:${st.color}">${esc(st.text)}</span>
      <span class="wave-time">${fmtTime(w.time)}</span>
      ${isMe?`<button class="delete-btn" onclick="deleteWave('${w.id}')">${T('destruct')}</button>`:''}
    </div>
    ${w.text?`<div class="wave-text">${esc(w.text)}</div>`:''}
    ${w.media?`<img src="${w.media}" style="max-width:min(480px,100%);max-height:300px;object-fit:contain;margin-bottom:12px;display:block;">`:''}
    ${w.sticker?stickerMsgHTML(getStickerDef(w.sticker)):''}
    <div class="wave-footer">
      <button class="action-btn${echoed?' echoed-disabled':''}" onclick="doEcho('${w.id}')">⚡ ${w.echoes} ECHOES${echoed?' ✓':''}</button>
      <button class="action-btn" onclick="openDetails('${w.id}')">💬 ${w.replies.length} REPLIES</button>
    </div>
  </div>`;
}

function doEcho(wid){
  if(SESSION.echoed.has(wid)){toast(T('echo_done'));return;}
  SESSION.echoed.add(wid);
  const db=getDB();const w=db.waves.find(x=>x.id===wid);
  if(w){
    w.echoes++;
    if(!w.echoedBy)w.echoedBy=[];
    if(!w.echoedBy.includes(SESSION.user))w.echoedBy.push(SESSION.user);
    // persist per user
    if(!db.users[SESSION.user].echoedWaves)db.users[SESSION.user].echoedWaves=[];
    if(!db.users[SESSION.user].echoedWaves.includes(wid))db.users[SESSION.user].echoedWaves.push(wid);
    saveDB(db);
  }
  renderFeed();
}

function deleteWave(wid){
  if(!confirm(T('destruct_confirm')))return;
  const db=getDB();db.waves=db.waves.filter(x=>x.id!==wid);saveDB(db);renderFeed();toast(T('toast_destructed'));
}

function sendReply(wid){

function renderChatMessages(partner){

  const c=document.getElementById('chat-messages');
  if(!msgs.length){c.innerHTML=`<div class="empty-state">${T('channel_established')}</div>`;return;}
  c.innerHTML=msgs.map(m=>{

function saveEditProfile(){
  const dn=document.getElementById('edit-dn').value.trim();
  const newUname=document.getElementById('edit-uname').value.trim().replace(/\s+/g,'_');
  const bio=document.getElementById('edit-bio').value.trim();
  const bday=document.getElementById('edit-bday').value;
  const db=getDB();
  // username change
  if(newUname&&newUname!==SESSION.user){
    if(db.users[newUname]){toast(T('username_taken'));return;}
    // migrate user data
    const userData={...db.users[SESSION.user]};
    db.users[newUname]=userData;delete db.users[SESSION.user];
    // migrate waves
    db.waves.forEach(w=>{if(w.author===SESSION.user)w.author=newUname;w.replies&&w.replies.forEach(r=>{if(r.u===SESSION.user)r.u=newUname;});});
    // migrate chats
    Object.keys(db.chats).forEach(cid=>{
      if(cid.includes(SESSION.user)){
        const newCid=chatId(newUname,cid.split('_').find(x=>x!==SESSION.user)||newUname);
        db.chats[newCid]=db.chats[cid].map(m=>m.u===SESSION.user?{...m,u:newUname}:m);
        delete db.chats[cid];
      }
    });
    saveDB(db);toast(T('username_changed'));setTimeout(()=>doLogout(),2000);return;
  }
  db.users[SESSION.user].displayName=dn;db.users[SESSION.user].bio=bio;db.users[SESSION.user].birthday=bday;
  saveDB(db);showMyProfile();toast(T('toast_profile'));
}

// PING INDICATOR
// ============================================================
const PING_HISTORY = [];
async function measurePing() {
  const start = performance.now();
  try {
    await fetch('https://www.google.com/favicon.ico?_=' + Date.now(), {mode:'no-cors', cache:'no-store'});
  } catch(e) {}
  const ms = Math.round(performance.now() - start);
  PING_HISTORY.push(ms);
  if (PING_HISTORY.length > 5) PING_HISTORY.shift();
  const avg = Math.round(PING_HISTORY.reduce((a,b)=>a+b,0)/PING_HISTORY.length);
  updatePingUI(avg);
}

function updatePingUI(ms) {
  const dot = document.getElementById('ping-dot');
  const val = document.getElementById('ping-value');
  const bars = document.querySelectorAll('#ping-bars .ping-bar');
  if (!dot || !val) return;
  val.textContent = ms + ' ms';
  const cls = ms < 80 ? '' : ms < 200 ? 'warn' : 'bad';
  dot.className = 'ping-dot' + (cls ? ' '+cls : '');
  const levels = ms < 80 ? 4 : ms < 150 ? 3 : ms < 250 ? 2 : 1;
  bars.forEach((b, i) => {
    b.className = 'ping-bar' + (i < levels ? ' active' + (cls ? ' '+cls : '') : '');
  });
}

function startPingMonitor() {
  measurePing();
  setInterval(measurePing, 5000);
}

let _mediaRecorder = null;
let _audioChunks = [];
let _recTimer = null;
let _recSeconds = 0;
let _currentWavForVoice = null; // chat partner when recording

function startVoiceRecord() {
  if (_mediaRecorder) return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
    _mediaRecorder = new MediaRecorder(stream);
    _audioChunks = [];
    _recSeconds = 0;
    _mediaRecorder.ondataavailable = e => { if(e.data.size>0) _audioChunks.push(e.data); };
    _mediaRecorder.start(100);
    _currentWavForVoice = SESSION.currentChat;
    // show rec bar
    const bar = document.getElementById('voice-rec-bar');
    if (bar) bar.classList.add('active');
    _recTimer = setInterval(() => {
      _recSeconds++;
      const el = document.getElementById('voice-rec-timer');
      if (el) el.textContent = Math.floor(_recSeconds/60)+':'+((_recSeconds%60).toString().padStart(2,'0'));
    }, 1000);
  }).catch(() => toast(T('voice_no_mic')));
}

function stopVoiceRecord(send) {
  if (!_mediaRecorder) return;
  clearInterval(_recTimer);
  _recTimer = null;
  const bar = document.getElementById('voice-rec-bar');
  if (bar) bar.classList.remove('active');
  _mediaRecorder.onstop = () => {
    if (send && _currentWavForVoice) {
      const blob = new Blob(_audioChunks, {type:'audio/webm'});
      const reader = new FileReader();
      reader.onload = e => {
        const db = getDB();
        const cid = chatId(SESSION.user, _currentWavForVoice);
        if (!db.chats[cid]) db.chats[cid] = [];
        db.chats[cid].push({
          u: SESSION.user, m: '', img: null, sticker: null,
          voice: e.target.result,
          voiceDur: _recSeconds,
          t: new Date().toISOString()
        });
        saveDB(db);
        renderChatMessages(_currentWavForVoice);
      };
      reader.readAsDataURL(blob);
    }
    _mediaRecorder.stream.getTracks().forEach(t => t.stop());
    _mediaRecorder = null;
    _audioChunks = [];
  };
  _mediaRecorder.stop();
}

function voiceMsgHTML(voiceData, dur, isMe) {
  const bars = Array.from({length:16}, (_,i) => {
    const h = 4 + Math.floor(Math.sin(i*0.8)*8 + Math.random()*6);
    return `<div class="voice-bar" style="height:${h}px;"></div>`;
  }).join('');
  const durStr = Math.floor(dur/60)+':'+(( dur%60).toString().padStart(2,'0'));
  const uid = 'vp_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
  return `<div class="voice-msg${isMe?' mine':''}">
    <button class="voice-play-btn" onclick="playVoice('${uid}','${voiceData}')" title="Play">▶</button>
    <div class="voice-waveform" id="${uid}-wave">${bars}</div>
    <span class="voice-duration">${durStr}</span>
    <audio id="${uid}" src="${voiceData}" style="display:none" onended="resetVoiceUI('${uid}')"></audio>
  </div>`;
}

function playVoice(uid, src) {
  // stop all others
  document.querySelectorAll('audio').forEach(a => { if(a.id !== uid) { a.pause(); a.currentTime=0; } });
  const audio = document.getElementById(uid);
  if (!audio) return;
  if (audio.paused) {
    audio.play();
    const btn = audio.parentElement.querySelector('.voice-play-btn');
    if (btn) btn.textContent = '■';
    // animate bars
    const waveEl = document.getElementById(uid+'-wave');
    if (waveEl) {
      const barEls = waveEl.querySelectorAll('.voice-bar');
      let prog = 0;
      const anim = setInterval(() => {
        barEls.forEach((b,i) => b.classList.toggle('lit', i <= prog % barEls.length));
        prog++;
        if (audio.paused) { clearInterval(anim); barEls.forEach(b=>b.classList.remove('lit')); }
      }, 150);
    }
  } else {
    audio.pause(); audio.currentTime = 0;
    const btn = audio.parentElement.querySelector('.voice-play-btn');
    if (btn) btn.textContent = '▶';
  }
}

function resetVoiceUI(uid) {
  const btn = document.getElementById(uid)?.parentElement?.querySelector('.voice-play-btn');
  if (btn) btn.textContent = '▶';
}

let _currentSector = null;

function freshSectors() {

}

function switchSectorTab(tab) {
  _sectorTab = tab;

}

function renderSectors() {

function openCreateSector() {

let _selectedSectorIcon = SECTOR_ICONS[0];
function selectSectorIcon(el, icon) {

    s.style.borderColor = s.dataset.icon === icon ? 'var(--accent)' : 'transparent'
  );

function createSector() {
  const name = document.getElementById('new-sector-name').value.trim();
  if (!name) return;
  const desc = document.getElementById('new-sector-desc').value.trim();
  const db = freshSectors();
  const id = 'sec_'+Date.now();
  db.sectors.push({
    id, name, desc, icon: _selectedSectorIcon,
    creator: SESSION.user,
    members: [SESSION.user],
    created: new Date().toISOString()
  });
  saveDB(db);
  document.getElementById('create-sector-area').innerHTML = '';
  renderSectors();
  toast(T('sector_created'));
}

function joinSector(sid) {
  const db = freshSectors();
  const s = db.sectors.find(x => x.id === sid);
  if (!s || s.members.includes(SESSION.user)) return;
  s.members.push(SESSION.user);
  saveDB(db);
  renderSectors();
  toast(T('sector_joined_ok'));
}

function leaveSector(sid) {
  const db = freshSectors();
  const s = db.sectors.find(x => x.id === sid);
  if (!s) return;
  s.members = s.members.filter(m => m !== SESSION.user);
  saveDB(db);
  gotoSection('sectors');
  renderSectors();
  toast(T('sector_left'));
}

function openSector(sid) {
  _currentSector = sid;
  const db = freshSectors();
  const s = db.sectors.find(x => x.id === sid);
  if (!s) return;
  const isMember = s.members.includes(SESSION.user);
  document.getElementById('sector-detail-icon').textContent = s.icon;
  document.getElementById('sector-detail-name').textContent = s.name;
  document.getElementById('sector-detail-members').textContent = s.members.length + ' ' + T('sector_members');
  document.getElementById('sector-detail-actions').innerHTML = isMember
    ? `<button class="btn btn-ghost btn-sm" onclick="leaveSector('${sid}')">${T('sector_leave')}</button>`
    : `<button class="btn btn-accent btn-sm" onclick="joinSector('${sid}');openSector('${sid}')">${T('sector_join')}</button>`;
  const inputWrap = document.getElementById('sector-input-wrap');
  if (inputWrap) inputWrap.style.display = isMember ? 'flex' : 'none';
  buildStickerPicker('sector-sticker-picker', 'sendSectorSticker');
  renderSectorMessages(sid);
  gotoSection('sector-detail');
  document.getElementById('sector-input').placeholder = T('chat_placeholder');
  document.getElementById('sector-send-btn').textContent = T('sector_post');
  document.getElementById('sector-input').addEventListener('keydown', e => { if(e.key==='Enter') sendSectorMessage(); });
}

function renderSectorMessages(sid) {
  const db = freshSectors();
  const msgs = (db.sectorChats && db.sectorChats[sid]) || [];
  const container = document.getElementById('sector-messages');
  if (!msgs.length) {
    container.innerHTML = `<div class="empty-state">${T('channel_established')}</div>`;
    return;
  }
  container.innerHTML = msgs.map(m => {
    const isMe = m.u === SESSION.user;
    const sdef = m.sticker ? getStickerDef(m.sticker) : null;
    return `<div class="msg-row ${isMe?'mine':'theirs'}">
      ${!isMe ? miniAv(m.u, 24) : ''}
      <div class="msg-col ${isMe?'mine-col':''}">
        ${!isMe ? `<div style="font-family:var(--font-mono);font-size:9px;color:var(--accent);margin-bottom:3px;">${esc(m.u)}</div>` : ''}
        ${sdef ? stickerMsgHTML(sdef) : ''}
        ${m.m ? `<div class="msg-bubble">${esc(m.m)}</div>` : ''}
        <div class="msg-time" style="${isMe?'text-align:right':''}">${fmtTime(m.t)}</div>
      </div>
      ${isMe ? miniAv(m.u, 24) : ''}
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function sendSectorMessage() {
  if (!_currentSector) return;
  const inp = document.getElementById('sector-input');
  const msg = inp.value.trim();
  if (!msg) return;
  const db = freshSectors();
  if (!db.sectorChats) db.sectorChats = {};
  if (!db.sectorChats[_currentSector]) db.sectorChats[_currentSector] = [];
  db.sectorChats[_currentSector].push({u: SESSION.user, m: msg, t: new Date().toISOString()});
  saveDB(db);
  inp.value = '';
  renderSectorMessages(_currentSector);
}

function sendSectorSticker(stickerId) {
  if (!_currentSector) return;
  document.querySelectorAll('.sticker-picker').forEach(p => p.classList.remove('open'));
  const db = freshSectors();
  if (!db.sectorChats) db.sectorChats = {};
  if (!db.sectorChats[_currentSector]) db.sectorChats[_currentSector] = [];
  db.sectorChats[_currentSector].push({u: SESSION.user, m: '', sticker: stickerId, t: new Date().toISOString()});
  saveDB(db);
  renderSectorMessages(_currentSector);
}

// ============================================================
function startGlitchEffects(){
  const targets=['.section-title','#sidebar-name','.wave-author','.auth-logo','.sidebar-logo'];
  setInterval(()=>{
    const pool=[];targets.forEach(sel=>pool.push(...document.querySelectorAll(sel)));
    if(!pool.length)return;
    const el=pool[Math.floor(Math.random()*pool.length)];
    el.style.transition='none';
    const saved=el.style.textShadow;
    el.style.textShadow=`-2px 0 #f00, 2px 0 #0ff`;
    el.style.transform=`skewX(${(Math.random()-.5)*3}deg) translateX(${(Math.random()-.5)*4}px)`;
    setTimeout(()=>{el.style.textShadow=`2px 0 #f00, -2px 0 #0ff`;el.style.transform=`translateX(${(Math.random()-.5)*3}px)`;
      setTimeout(()=>{el.style.textShadow=saved||'';el.style.transform='';},80);},80);
  },3500);

  // random scanline flash overlay
  const flash=document.createElement('div');
  flash.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9997;opacity:0;background:linear-gradient(transparent 40%,rgba(0,255,127,.04) 40%,rgba(0,255,127,.04) 41%,transparent 41%);';
  document.body.appendChild(flash);
  setInterval(()=>{flash.style.opacity='1';flash.style.backgroundPositionY=`${Math.random()*100}%`;setTimeout(()=>flash.style.opacity='0',120);},6000);
}

function buildStickerPicker(pickerId, onPickFn) {
  const picker = document.getElementById(pickerId);
  if (!picker) return;
  picker.innerHTML = STICKERS.map(s =>
    `<div class="sticker-sprite" onclick="(${onPickFn})('${s.id}')" title="${s.label}">
      <img src="${s.src}" style="width:44px;height:44px;image-rendering:pixelated;image-rendering:crisp-edges;display:block;">
    </div>`
  ).join('');
}

function initAllPickers() {
  buildStickerPicker('chat-sticker-picker', 'sendSticker');
  buildStickerPicker('wave-sticker-picker', 'addStickerToWave');
  buildStickerPicker('sector-sticker-picker', 'sendSectorSticker');
}

function togglePicker(pickerId) {
  document.querySelectorAll('.sticker-picker').forEach(p => {
    if(p.id !== pickerId) p.classList.remove('open');
  });
  document.getElementById(pickerId).classList.toggle('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.picker-wrap')) {
    document.querySelectorAll('.sticker-picker').forEach(p => p.classList.remove('open'));
  }
});

function getStickerSrc(id) {
  const s = STICKERS.find(x => x.id === id);
  return s ? s.src : null;
}

function getStickerDef(id) { return STICKERS.find(s => s.id === id); }

function stickerMsgHTML(idOrDef) {
  const src = typeof idOrDef === 'string'
    ? getStickerSrc(idOrDef)
    : (idOrDef && idOrDef.src ? idOrDef.src : null);
  if (!src) return '';
  return `<div style="display:inline-block;margin:3px 0;background:transparent;border:none;vertical-align:bottom;">
    <img src="${src}" style="width:72px;height:72px;image-rendering:pixelated;image-rendering:crisp-edges;display:block;">
  </div>`;
}

function sendSticker(stickerId) {
  const partner = SESSION.currentChat; if (!partner) return;
  document.querySelectorAll('.sticker-picker').forEach(p => p.classList.remove('open'));
  const db = getDB();
  const cid = chatId(SESSION.user, partner);
  if (!db.chats[cid]) db.chats[cid] = [];
  db.chats[cid].push({u: SESSION.user, m: '', img: null, sticker: stickerId, t: new Date().toISOString()});
  saveDB(db);
  renderChatMessages(partner);
}

let _waveDraftSticker = null;
function addStickerToWave(stickerId) {
  _waveDraftSticker = stickerId;
  document.querySelectorAll('.sticker-picker').forEach(p => p.classList.remove('open'));
  const src = getStickerSrc(stickerId);
  const lbl = document.getElementById('attach-label');
  if (lbl) lbl.innerHTML = src ? `<img src="${src}" style="width:24px;height:24px;image-rendering:pixelated;vertical-align:middle;"> выбран` : '😀 выбран';
  toast('Стикер выбран');
}

function addStickerToReply(stickerId, wid) {
  document.querySelectorAll('.sticker-picker').forEach(p => p.classList.remove('open'));
  const db = getDB();
  const wave = db.waves.find(x => x.id === wid);
  if (!wave) return;
  wave.replies.push({u: SESSION.user, m: '', sticker: stickerId, t: new Date().toISOString()});
  saveDB(db);
  openDetails(wid);
  toast(T('toast_replied'));
}
// INIT
applyLang();
window.addEventListener('load',startGlitchEffects);
</script>
